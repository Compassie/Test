<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crystal · Neon Glass</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Vignette overlay */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* Scanline texture */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }

    /* Corner UI accents */
    .corner {
      position: fixed;
      z-index: 3;
      width: 60px;
      height: 60px;
      pointer-events: none;
      opacity: 0.5;
    }
    .corner--tl { top: 24px; left: 24px; border-top: 1px solid #ff4dff; border-left: 1px solid #ff4dff; }
    .corner--tr { top: 24px; right: 24px; border-top: 1px solid #4ddfff; border-right: 1px solid #4ddfff; }
    .corner--bl { bottom: 24px; left: 24px; border-bottom: 1px solid #ff4dff; border-left: 1px solid #ff4dff; }
    .corner--br { bottom: 24px; right: 24px; border-bottom: 1px solid #4ddfff; border-right: 1px solid #4ddfff; }

    /* Label */
    .label {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>
  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>
  <p class="label">crystalline · refraction study</p>

  <!-- Three.js r128 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
  (function () {
    /* ─── Renderer ─────────────────────────────────────────────── */
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    /* ─── Scene & Camera ───────────────────────────────────────── */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x03000d);
    scene.fog = new THREE.FogExp2(0x03000d, 0.06);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 5.5);
    camera.lookAt(0, 0, 0);

    /* ─── Environment (fake IBL via gradient cube) ─────────────── */
    const envScene = new THREE.Scene();
    const envGeom = new THREE.SphereGeometry(5, 16, 16);
    const envMat = new THREE.MeshBasicMaterial({
      side: THREE.BackSide,
      vertexColors: true
    });
    // Colour the sphere vertices: top=deep-blue, equator=black, bottom=dark-pink
    const posArr = envGeom.attributes.position;
    const colors = [];
    for (let i = 0; i < posArr.count; i++) {
      const y = posArr.getY(i);
      const t = (y + 5) / 10; // 0..1
      const r = THREE.MathUtils.lerp(0.18, 0.01, t);
      const g = THREE.MathUtils.lerp(0.0,  0.01, t);
      const b = THREE.MathUtils.lerp(0.22, 0.18, t);
      colors.push(r, g, b);
    }
    envGeom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    envScene.add(new THREE.Mesh(envGeom, envMat));

    /* ─── Lights ───────────────────────────────────────────────── */
    const ambient = new THREE.AmbientLight(0x110022, 1.5);
    scene.add(ambient);

    // Neon pink key light
    const pinkLight = new THREE.PointLight(0xff30cc, 120, 20);
    pinkLight.position.set(-3.5, 3, 2);
    pinkLight.castShadow = true;
    pinkLight.shadow.mapSize.set(512, 512);
    scene.add(pinkLight);

    // Neon blue fill light
    const blueLight = new THREE.PointLight(0x1ad4ff, 100, 20);
    blueLight.position.set(3.5, -1.5, 2);
    blueLight.castShadow = false;
    scene.add(blueLight);

    // Subtle white rim from behind
    const rimLight = new THREE.DirectionalLight(0xffffff, 0.6);
    rimLight.position.set(0, 0, -6);
    scene.add(rimLight);

    // Small accent pink above
    const topLight = new THREE.SpotLight(0xff55ff, 60, 12, Math.PI / 6, 0.4);
    topLight.position.set(0, 5, 1);
    topLight.target.position.set(0, 0, 0);
    scene.add(topLight);
    scene.add(topLight.target);

    /* ─── Glass Crystal Material ───────────────────────────────── */
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      metalness: 0.0,
      roughness: 0.0,
      transmission: 0.95,       // glass transparency
      thickness: 1.8,           // refraction depth
      ior: 2.4,                 // diamond-like IOR
      reflectivity: 1.0,
      envMapIntensity: 2.0,
      clearcoat: 1.0,
      clearcoatRoughness: 0.0,
      transparent: true,
      opacity: 0.92,
      side: THREE.DoubleSide,
      emissive: 0x220033,
      emissiveIntensity: 0.12,
    });

    /* ─── Crystal Geometry (compound icosahedron + stretched) ──── */
    // We build a custom crystal from an IcosahedronGeometry + elongated points
    function buildCrystal() {
      const group = new THREE.Group();

      // Core: slightly squashed icosahedron
      const coreGeo = new THREE.IcosahedronGeometry(1.1, 0);
      // Squash on Y to make it more "gem"-like
      const pos = coreGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.setY(i, pos.getY(i) * 0.72);
      }
      pos.needsUpdate = true;
      coreGeo.computeVertexNormals();
      group.add(new THREE.Mesh(coreGeo, glassMat));

      // Top spire
      const topGeo = new THREE.ConeGeometry(0.42, 1.6, 6, 1);
      topGeo.translate(0, 1.18, 0);
      group.add(new THREE.Mesh(topGeo, glassMat));

      // Bottom spire
      const botGeo = new THREE.ConeGeometry(0.42, 1.6, 6, 1);
      botGeo.rotateZ(Math.PI);
      botGeo.translate(0, -1.18, 0);
      group.add(new THREE.Mesh(botGeo, glassMat));

      // Inner highlight shard (slightly smaller, inverted)
      const shardGeo = new THREE.OctahedronGeometry(0.55, 0);
      shardGeo.scale(0.8, 1.4, 0.8);
      const shardMat = glassMat.clone();
      shardMat.emissive = new THREE.Color(0x3311aa);
      shardMat.emissiveIntensity = 0.35;
      shardMat.opacity = 0.55;
      group.add(new THREE.Mesh(shardGeo, shardMat));

      return group;
    }

    const crystal = buildCrystal();
    scene.add(crystal);

    /* ─── Floating Shards ──────────────────────────────────────── */
    const shards = [];
    const shardGeometries = [
      new THREE.OctahedronGeometry(0.14, 0),
      new THREE.TetrahedronGeometry(0.18, 0),
      new THREE.IcosahedronGeometry(0.10, 0),
    ];

    for (let i = 0; i < 26; i++) {
      const geo = shardGeometries[i % shardGeometries.length];
      const mat = glassMat.clone();
      mat.emissive = new THREE.Color(i % 2 === 0 ? 0xff00cc : 0x00ccff);
      mat.emissiveIntensity = 0.2 + Math.random() * 0.3;
      mat.opacity = 0.4 + Math.random() * 0.4;

      const mesh = new THREE.Mesh(geo, mat);
      const radius = 2.2 + Math.random() * 1.6;
      const theta  = Math.random() * Math.PI * 2;
      const phi    = (Math.random() - 0.5) * Math.PI;
      mesh.position.set(
        radius * Math.cos(theta) * Math.cos(phi),
        radius * Math.sin(phi) * 1.1,
        radius * Math.sin(theta) * Math.cos(phi)
      );
      mesh.rotation.set(
        Math.random() * Math.PI,
        Math.random() * Math.PI,
        Math.random() * Math.PI
      );
      const scale = 0.5 + Math.random() * 1.2;
      mesh.scale.setScalar(scale);

      shards.push({
        mesh,
        orbitRadius: radius,
        orbitTheta: theta,
        orbitPhi: phi,
        orbitSpeed: (Math.random() - 0.5) * 0.004,
        floatSpeed: 0.3 + Math.random() * 0.7,
        floatOffset: Math.random() * Math.PI * 2,
        rotSpeed: new THREE.Vector3(
          (Math.random() - 0.5) * 0.02,
          (Math.random() - 0.5) * 0.02,
          (Math.random() - 0.5) * 0.02
        )
      });
      scene.add(mesh);
    }

    /* ─── Ground Reflective Plane ──────────────────────────────── */
    const groundMat = new THREE.MeshPhysicalMaterial({
      color: 0x050010,
      metalness: 0.1,
      roughness: 0.05,
      reflectivity: 0.9,
      transparent: true,
      opacity: 0.7,
    });
    const ground = new THREE.Mesh(new THREE.CircleGeometry(7, 64), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.95;
    ground.receiveShadow = true;
    scene.add(ground);

    /* ─── Particle Dust ────────────────────────────────────────── */
    const dustCount = 400;
    const dustPositions = new Float32Array(dustCount * 3);
    const dustColors    = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      const i3 = i * 3;
      dustPositions[i3]     = (Math.random() - 0.5) * 14;
      dustPositions[i3 + 1] = (Math.random() - 0.5) * 10;
      dustPositions[i3 + 2] = (Math.random() - 0.5) * 14;
      // Alternate pink / blue
      if (Math.random() > 0.5) {
        dustColors[i3] = 1; dustColors[i3+1] = 0.18; dustColors[i3+2] = 0.9;
      } else {
        dustColors[i3] = 0.1; dustColors[i3+1] = 0.8; dustColors[i3+2] = 1;
      }
    }
    const dustGeo = new THREE.BufferGeometry();
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
    dustGeo.setAttribute('color',    new THREE.BufferAttribute(dustColors,    3));
    const dustMat = new THREE.PointsMaterial({
      size: 0.045,
      vertexColors: true,
      transparent: true,
      opacity: 0.6,
      sizeAttenuation: true,
      depthWrite: false,
    });
    const dust = new THREE.Points(dustGeo, dustMat);
    scene.add(dust);

    /* ─── Light Halo Rings ─────────────────────────────────────── */
    function makeRing(radius, color, opacity) {
      const geo = new THREE.TorusGeometry(radius, 0.012, 8, 120);
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, depthWrite: false });
      return new THREE.Mesh(geo, mat);
    }
    const ring1 = makeRing(1.8, 0xff33cc, 0.18);
    const ring2 = makeRing(2.4, 0x22ddff, 0.12);
    const ring3 = makeRing(3.1, 0xff33cc, 0.07);
    ring1.rotation.x = Math.PI / 2;
    ring2.rotation.x = Math.PI / 2.5;
    ring3.rotation.x = Math.PI / 1.8;
    scene.add(ring1, ring2, ring3);

    /* ─── Resize Handler ───────────────────────────────────────── */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ─── Mouse Parallax ───────────────────────────────────────── */
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    /* ─── Animation Loop ───────────────────────────────────────── */
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      /* Crystal rotation */
      crystal.rotation.y  = t * 0.28;
      crystal.rotation.x  = Math.sin(t * 0.18) * 0.22;
      crystal.rotation.z  = Math.cos(t * 0.13) * 0.12;
      crystal.position.y  = Math.sin(t * 0.55) * 0.12;

      /* Halo rings */
      ring1.rotation.z = t * 0.15;
      ring2.rotation.z = -t * 0.10;
      ring3.rotation.z = t * 0.07;
      ring1.rotation.x = Math.PI / 2 + Math.sin(t * 0.2) * 0.3;
      ring2.rotation.x = Math.PI / 2.5 + Math.cos(t * 0.17) * 0.25;

      /* Lights pulse */
      pinkLight.intensity = 110 + Math.sin(t * 1.3) * 25;
      blueLight.intensity =  90 + Math.cos(t * 1.1) * 20;

      /* Shards orbit */
      shards.forEach((s, i) => {
        s.orbitTheta += s.orbitSpeed;
        const floatY = Math.sin(t * s.floatSpeed + s.floatOffset) * 0.25;
        s.mesh.position.set(
          s.orbitRadius * Math.cos(s.orbitTheta) * Math.cos(s.orbitPhi),
          s.orbitRadius * Math.sin(s.orbitPhi) + floatY,
          s.orbitRadius * Math.sin(s.orbitTheta) * Math.cos(s.orbitPhi)
        );
        s.mesh.rotation.x += s.rotSpeed.x;
        s.mesh.rotation.y += s.rotSpeed.y;
        s.mesh.rotation.z += s.rotSpeed.z;
      });

      /* Dust drift */
      dust.rotation.y = t * 0.012;
      dust.rotation.x = t * 0.005;

      /* Camera subtle parallax */
      camera.position.x += (mouse.x * 0.5 - camera.position.x) * 0.03;
      camera.position.y += (-mouse.y * 0.3 + 1.2 - camera.position.y) * 0.03;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();
  })();
  </script>
</body>
</html>
