<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon Glass Crystal</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">Three.js Physical Glass + Neon Lighting</div>

    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        // Important for glass-like materials
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- Geometry: An Octahedron for a classic crystal shape ---
        const geometry = new THREE.OctahedronGeometry(1, 0); 

        // --- Material: Advanced Physical Glass ---
        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0,
            roughness: 0.05,
            transmission: 1, // High transparency
            thickness: 0.5,  // Refraction depth
            ior: 1.5,        // Index of Refraction (1.5 is standard glass)
            iridescence: 0.3,
            iridescenceIOR: 1.8,
            sheen: 1,
            sheenColor: 0x00ffff,
            transparent: true
        });

        const crystal = new THREE.Mesh(geometry, glassMaterial);
        scene.add(crystal);

        // --- Lighting: Neon Pink & Blue ---
        const blueLight = new THREE.PointLight(0x00ffff, 15, 10);
        blueLight.position.set(-2, 2, 2);
        scene.add(blueLight);

        const pinkLight = new THREE.PointLight(0xff00ff, 15, 10);
        pinkLight.position.set(2, -2, 2);
        scene.add(pinkLight);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5); // Soft fill
        scene.add(ambientLight);

        camera.position.z = 4;

        // --- Handle Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Smooth Rotation
            crystal.rotation.y += 0.005;
            crystal.rotation.x += 0.007;

            // Subtle "breathing" effect for the lights
            const time = Date.now() * 0.001;
            blueLight.intensity = 10 + Math.sin(time) * 5;
            pinkLight.intensity = 10 + Math.cos(time) * 5;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
